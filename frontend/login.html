<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBCIANS APPOINTIZEN | Login</title>
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/auth.css" />
  </head>
  <body class="auth-body">
    <main class="auth-layout">
      <section class="auth-hero">
        <div class="auth-hero__overlay"></div>
        <div class="auth-hero__brand">
          <img src="/assets/logo.png" alt="Mindoro State University logo" class="auth-hero__logo" />
          <span class="eyebrow">Mindoro State University</span>
          <h1>MBCIANS APPOINTIZEN</h1>
          <p>Registrar appointment scheduling with live status updates for students and staff.</p>
        </div>
      </section>

      <section class="auth-panel">
        <form id="login-form" class="auth-card" novalidate>
          <div class="auth-card__header">
            <img src="/assets/logo.png" alt="MBCIANS APPOINTIZEN logo" class="auth-card__logo" />
            <div>
              <span class="eyebrow">Secure Access</span>
              <h2>Sign in to your portal</h2>
              <p>Use your institution account to continue.</p>
            </div>
          </div>

          <label class="field">
            <span>Email address</span>
            <input id="email" name="email" type="email" placeholder="name@minsu.edu.ph" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
          </label>

          <button id="login-button" type="submit" class="button button--primary button--block">Sign In</button>
          <p id="login-message" class="form-message" aria-live="polite"></p>

          <div class="auth-card__footer">
            <span>Don't have an account?</span>
            <a href="./register.html">Sign up</a>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/login.js"></script>
  </body>
</html>
